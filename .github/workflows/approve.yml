name: '🤖 PR Auto Approve'
on:
  pull_request:
    types: [review_requested]

permissions:
  pull-requests: write
  checks: write
  contents: write
  statuses: read

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    name: '🤖 PR Auto Approve'
    steps:
      - uses: github/privileged-requester@daf8e2a8f0e8d7773bab59d1e0a14162d8e01b61 # v2.3.3
        if: ${{ github.event.requested_reviewer.login == 'InReach-svc'}}
        with:
          github_token: ${{ secrets.GH_ACT_PAT }}
          path: .github/autoapprove-config.yaml
          checkCommits: 'false'
          checkDiff: 'false'
          checkLabels: 'false'
